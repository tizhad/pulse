<div class="ct-root">
  <header class="ct-header">
    <span class="eyebrow">Get in touch</span>
    <h1 class="ct-title">Let's talk about your project.</h1>
  </header>

  <main class="ct-main">
    <!-- Left: form -->
    <section class="ct-col ct-col--form">
      <h2 class="ct-section-title">Send a message</h2>

      <form class="ct-form" (submit)="$event.preventDefault(); send()">
        <div class="ct-field">
          <label class="ct-label" for="ct-name">Name</label>
          <input
            id="ct-name"
            class="ct-input"
            type="text"
            [value]="name()"
            (input)="name.set($any($event.target).value)"
            autocomplete="name"
          />
        </div>

        <div class="ct-field">
          <label class="ct-label" for="ct-email">Email</label>
          <input
            id="ct-email"
            class="ct-input"
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="email"
          />
        </div>

        <div class="ct-field">
          <label class="ct-label" for="ct-subject">Subject</label>
          <input
            id="ct-subject"
            class="ct-input"
            type="text"
            placeholder="What's this about?"
            [value]="subject()"
            (input)="subject.set($any($event.target).value)"
          />
        </div>

        <div class="ct-field">
          <label class="ct-label" for="ct-message">Message</label>
          <textarea
            id="ct-message"
            class="ct-input ct-textarea"
            rows="5"
            [value]="message()"
            (input)="message.set($any($event.target).value)"
          ></textarea>
        </div>

        @if (sent()) {
          <p class="ct-success">Message opened in your email client.</p>
        }

        <button class="btn-primary btn-arrow ct-btn-send" type="submit" [disabled]="!isValid()">
          Send message
        </button>
      </form>
    </section>

    <!-- Right: contact info -->
    <section class="ct-col ct-col--info">
      <h2 class="ct-section-title">Direct</h2>

      <div class="ct-contact-list">
        <a class="ct-contact-item" href="mailto:captain@app.tizhad.com">
          <div class="ct-contact-text">
            <span class="ct-contact-name">Email</span>
            <span class="ct-contact-val">captain&#64;app.tizhad.com</span>
          </div>
        </a>
      </div>
    </section>
  </main>

  <footer class="ct-footer">
    <p class="ct-footer-copy">Pulse · © 2026</p>
  </footer>
</div>
