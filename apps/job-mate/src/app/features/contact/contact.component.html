<div class="ct-root">
  <header class="ct-header">
    <h1 class="ct-title">Contact the Tizhad Crew</h1>
  </header>

  <main class="ct-main">
    <!-- Left: form -->
    <section class="ct-col ct-col--form">
      <h2 class="ct-section-title">Drop us a Message</h2>

      <form class="ct-form" (submit)="$event.preventDefault(); send()">
        <div class="ct-field">
          <input
            id="ct-name"
            class="ct-input"
            type="text"
            placeholder=" "
            [value]="name()"
            (input)="name.set($any($event.target).value)"
            autocomplete="name"
          />
          <label class="ct-label" for="ct-name">
            <strong>PIRATE NAME</strong>&nbsp;<span>(Name)</span>
          </label>
        </div>

        <div class="ct-field">
          <input
            id="ct-email"
            class="ct-input"
            type="email"
            placeholder=" "
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="email"
          />
          <label class="ct-label" for="ct-email">
            <strong>DEN DEN MUSHI ID</strong>&nbsp;<span>(Email)</span>
          </label>
        </div>

        <div class="ct-field">
          <input
            id="ct-subject"
            class="ct-input"
            type="text"
            placeholder=" "
            [value]="subject()"
            (input)="subject.set($any($event.target).value)"
          />
          <label class="ct-label" for="ct-subject">
            <strong>SUBJECT</strong>&nbsp;<span>(e.g., Grand Line Query)</span>
          </label>
        </div>

        <div class="ct-field ct-field--textarea">
          <textarea
            id="ct-message"
            class="ct-input ct-textarea"
            rows="4"
            placeholder=" "
            [value]="message()"
            (input)="message.set($any($event.target).value)"
          ></textarea>
          <label class="ct-label" for="ct-message">
            <strong>MESSAGE</strong>&nbsp;<span>(Write your log here...)</span>
          </label>
        </div>

        @if (sent()) {
          <p class="ct-success">
            ⚓ Message received! We'll reply by the next tide.
          </p>
        }

        <div class="ct-btn-wrap">
          <button class="ct-btn-send" type="submit" [disabled]="!isValid()">
            Send Message
          </button>
        </div>
      </form>
    </section>

    <!-- Right: contact info -->
    <section class="ct-col ct-col--info">
      <h2 class="ct-section-title">Choose your Transmission</h2>

      <div class="ct-contact-list">
        <a class="ct-contact-item" href="mailto:captain@app.tizhad.com">
          <div class="ct-contact-text">
            <span class="ct-contact-name">Den Den Mushi</span>
            <span class="ct-contact-val">captain&#64;app.tizhad.com</span>
          </div>
        </a>
      </div>
    </section>
  </main>

  <footer class="ct-footer">
    <p class="ct-footer-copy">
      © 2024 APP.TIZHAD.COM — ALL RIGHTS RESERVED ON THE GRAND LINE
    </p>
  </footer>
</div>
