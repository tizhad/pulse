<div class="re-wrap">

  <!-- Toolbar -->
  <div class="re-toolbar">

    <div class="re-group">
      <button class="re-btn" [class.re-btn--active]="active().bold"
              title="Bold" aria-label="Bold" (mousedown)="$event.preventDefault()" (click)="bold()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
          <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
        </svg>
      </button>

      <button class="re-btn" [class.re-btn--active]="active().italic"
              title="Italic" aria-label="Italic" (mousedown)="$event.preventDefault()" (click)="italic()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="4" x2="10" y2="4"/>
          <line x1="14" y1="20" x2="5" y2="20"/>
          <line x1="15" y1="4" x2="9" y2="20"/>
        </svg>
      </button>

      <button class="re-btn re-btn-text" [class.re-btn--active]="active().h2"
              title="Heading 2" aria-label="Heading 2" (mousedown)="$event.preventDefault()" (click)="heading()">H2</button>
    </div>

    <div class="re-sep"></div>

    <div class="re-group">
      <button class="re-btn" [class.re-btn--active]="active().bulletList"
              title="Bullet list" aria-label="Bullet list" (mousedown)="$event.preventDefault()" (click)="bulletList()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="9" y1="6" x2="20" y2="6"/>
          <line x1="9" y1="12" x2="20" y2="12"/>
          <line x1="9" y1="18" x2="20" y2="18"/>
        </svg>
      </button>

      <button class="re-btn" [class.re-btn--active]="active().orderedList"
              title="Ordered list" aria-label="Ordered list" (mousedown)="$event.preventDefault()" (click)="orderedList()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="6" x2="21" y2="6"/>
          <line x1="10" y1="12" x2="21" y2="12"/>
          <line x1="10" y1="18" x2="21" y2="18"/>
          <polyline points="3,4 5,4 5,10"/><line x1="3" y1="10" x2="5" y2="10"/>
          <path d="M3 14h2c0 0 0 1-1 2s-1 2 0 2h2"/>
          <path d="M3 18c0 0 2 1 2 2H3"/>
        </svg>
      </button>
    </div>

    <div class="re-sep"></div>

    <div class="re-group">
      <button class="re-btn" [class.re-btn--active]="active().code"
              title="Inline code" aria-label="Inline code" (mousedown)="$event.preventDefault()" (click)="inlineCode()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6L3 12l5 6"/>
          <path d="M16 6l5 6-5 6"/>
        </svg>
      </button>

      <button class="re-btn" [class.re-btn--active]="active().codeBlock"
              title="Code block" aria-label="Code block" (mousedown)="$event.preventDefault()" (click)="codeBlock()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2.5"/>
          <path d="M9.5 10L7.5 12l2 2" stroke-width="1.75"/>
          <path d="M14.5 10l2 2-2 2" stroke-width="1.75"/>
        </svg>
      </button>
    </div>

    <div class="re-sep"></div>

    <button class="re-btn" [class.re-btn--active]="active().link || showLinkInput()"
            title="Insert link" aria-label="Insert link" (mousedown)="$event.preventDefault()" (click)="toggleLinkInput()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>

  </div>

  <!-- Link input row -->
  @if (showLinkInput()) {
    <div class="re-link-row">
      <input
        class="re-link-input"
        type="url"
        placeholder="https://…"
        aria-label="Link URL"
        [value]="linkUrl()"
        (input)="linkUrl.set($any($event.target).value)"
        (keydown.enter)="insertLink()"
        (keydown.escape)="closeLinkInput()"
        autofocus
      />
      <button class="re-link-apply" (mousedown)="$event.preventDefault()" (click)="insertLink()">
        Apply
      </button>
      @if (active().link) {
        <button class="re-link-remove" (mousedown)="$event.preventDefault()" (click)="insertLink()">
          Remove
        </button>
      }
      <button class="re-link-cancel" title="Cancel" aria-label="Cancel" (mousedown)="$event.preventDefault()" (click)="closeLinkInput()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  }

  <!-- Tiptap mounts here -->
  <div #editorHost class="re-host"></div>

</div>
