@if (showShell()) {
<div class="shell">
  <!-- Mobile top bar -->
  <header class="mobile-header">
    <button
      class="hamburger"
      (click)="toggleSidebar()"
      aria-label="Toggle menu"
    >
      <svg
        width="20"
        height="20"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <div class="mobile-logo" role="button" tabindex="0" (click)="goHome()" (keydown.enter)="goHome()">
      <div class="logo-mark">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
      </div>
      <span class="logo-name">PULSE</span>
    </div>
  </header>

  <!-- Backdrop (mobile only, shown when sidebar is open) -->
  @if (sidebarOpen()) {
  <div
    class="sidebar-backdrop"
    role="presentation"
    tabindex="-1"
    (click)="closeSidebar()"
    (keydown.escape)="closeSidebar()"
  ></div>
  }

  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div
      class="sidebar-logo"
      role="button"
      tabindex="0"
      (click)="goHome()"
      (keydown.enter)="goHome()"
    >
      <div class="logo-mark">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">PULSE</span>
        <span class="logo-sub">INTERVIEW OS</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Dashboard
      </a>
      <a
        routerLink="/subjects"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path
            d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
          />
        </svg>
        Subjects
      </a>
      <a
        routerLink="/companies"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Companies
      </a>
      <a
        routerLink="/applications"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <rect x="2" y="7" width="20" height="14" rx="2" />
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
        </svg>
        Applications
      </a>
      <a
        routerLink="/resume"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
        Resume
      </a>
      <a
        routerLink="/ask"
        routerLinkActive="active"
        class="nav-ask"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"
          />
        </svg>
        Ask AI
        <span class="nav-soon">Soon</span>
      </a>
<a
        routerLink="/settings"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      @if (isAuthenticated()) {
        <div class="user-avatar">{{ (user()?.email ?? '?').charAt(0).toUpperCase() }}</div>
        <div class="user-info">
          <span class="user-email">{{ user()?.email }}</span>
        </div>
      } @else {
        <button type="button" class="sidebar-signin" (click)="authModal.open()">Sign in</button>
      }
    </div>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
} @else {
<router-outlet />
}

@if (authModal.isOpen()) {
<div class="auth-overlay" role="dialog" aria-modal="true" aria-label="Sign in" tabindex="-1" (click)="authModal.close()" (keydown.escape)="authModal.close()">
  <div class="auth-modal-wrap" tabindex="0" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
    <app-auth />
  </div>
</div>
}
